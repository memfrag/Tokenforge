only_rules: # only these rules will be applied
    - colon
    - comma
    - conditional_returns_on_newline
    - control_statement
    - empty_enum_arguments
    - empty_parameters
    - empty_parentheses_with_trailing_closure
    - legacy_cggeometry_functions
    - legacy_constant
    - legacy_constructor
    - legacy_hashing
    - legacy_nsgeometry_functions
    - class_delegate_protocol
    - weak_delegate
    - closing_brace
    - closure_parameter_position
    - closure_spacing
    - explicit_init
    - generic_type_name
    - identical_operands
    - implicit_getter
    - is_disjoint
    - leading_whitespace
    - literal_expression_end_indentation
    - mark
    - operator_usage_whitespace
    - operator_whitespace
    - overridden_super_call
    - override_in_extension
    - prohibited_super_call
    - protocol_property_accessors_order
    - redundant_discardable_let
    - redundant_nil_coalescing
    - redundant_objc_attribute
    - redundant_optional_initialization
    - redundant_void_return
    - return_arrow_whitespace
    - shorthand_operator
    - statement_position
    - switch_case_alignment
    - syntactic_sugar
    - trailing_comma
    - trailing_semicolon
    - unneeded_break_in_switch
    - unused_enumerated
    - unused_optional_binding
    - valid_ibinspectable
    - vertical_parameter_alignment
    - vertical_parameter_alignment_on_call
    - vertical_whitespace
    - void_return
    - yoda_condition
    - array_init
    - compiler_protocol_init
    - contains_over_first_not_nil
    - discouraged_direct_init
    - discouraged_object_literal
    - dynamic_inline
    - force_try
    - force_unwrapping
    - legacy_random
    - custom_rules
    
excluded: # Takes precedence over `included`.
      - External
    
reporter: "xcode"

custom_rules:
    function_name_casing_setup:
      regex: 'func\s+setup[^a-z]'
      message: "Prefer 'setUp' over 'setup' when used as function name, unless it really is meant as a noun."
    function_name_casing_shutdown:
      regex: 'func\s+shutdown[^a-z]'
      message: "Prefer 'shutDown' over 'shutdown' when used as function name, unless it really is meant as a noun."
    function_name_casing_login:
      regex: 'func\s+login[^a-z]'
      message: "Prefer 'logIn' over 'login' when used as function name, unless it really is meant as a noun."
    function_name_casing_logout:
      regex: 'func\s+logout[^a-z]'
      message: "Prefer 'logOut' over 'logout' when used as function name, unless it really is meant as a noun."
    viewcontroller_acronym:
      regex: '(let|var)\s+vc[^a-z]'
      message: "Instead of the acronym 'vc', use the full word 'viewController'."
